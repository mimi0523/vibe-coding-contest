<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding Lab - 滑動拼圖</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6em;
      color: #c4b5fd;
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-shadow: 0 0 20px #a78bfa88;
    }

    .subtitle {
      font-size: 0.85em;
      color: #6b6b9a;
      margin-bottom: 18px;
    }

    /* Reference grid */
    .reference-label {
      font-size: 0.75em;
      color: #7070aa;
      margin-bottom: 6px;
      align-self: flex-start;
      margin-left: calc(50% - 240px);
    }

    .reference {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      width: 200px;
      margin-bottom: 18px;
    }

    .ref-cell {
      background: #1e1e3a;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      color: #c4b5fd;
    }

    .ref-cell.empty-ref {
      background: #111128;
      border: 1px dashed #2a2a4a;
      color: #333;
    }

    /* Puzzle */
    .puzzle-wrap {
      position: relative;
    }

    .puzzle {
      position: relative;
      width: 480px;
      height: 480px;
      border: 2px solid #6d28d9;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 30px #7c3aed44;
    }

    .tile {
      position: absolute;
      width: 120px;
      height: 120px;
      cursor: pointer;
      background-image: url('game.png');
      background-size: 480px 480px;
      border: 1.5px solid rgba(109, 40, 217, 0.4);
      transition: left 0.12s ease, top 0.12s ease, filter 0.1s;
      user-select: none;
    }

    .tile:hover {
      filter: brightness(1.15) drop-shadow(0 0 6px #a78bfa);
      z-index: 10;
    }

    .tile .num {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(0, 0, 0, 0.65);
      color: #d0d0ff;
      font-size: 12px;
      font-weight: bold;
      padding: 1px 5px;
      border-radius: 4px;
      pointer-events: none;
    }

    .tile.empty {
      background-image: none;
      background-color: #0a0a18;
      cursor: default;
      border: 1.5px dashed #2a2a4a;
    }

    .tile.empty:hover {
      filter: none;
    }

    .tile.landing {
      animation: landIn 0.3s ease;
    }

    @keyframes landIn {
      from { filter: brightness(2); }
      to   { filter: brightness(1); }
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      background: #4c1d95;
      color: #e0d0ff;
      border: 1px solid #7c3aed;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 0.9em;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #6d28d9;
    }

    .moves-label {
      font-size: 0.85em;
      color: #7070aa;
      margin-top: 10px;
    }

    /* Solution steps */
    .solution-wrap {
      width: 480px;
      margin-top: 16px;
      background: #111128;
      border: 1px solid #2e2e5a;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .solution-title {
      font-size: 0.78em;
      color: #7070aa;
      margin-bottom: 8px;
    }

    .solution-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      max-height: 120px;
      overflow-y: auto;
    }

    .step-badge {
      background: #1e1e3a;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 13px;
      font-weight: bold;
      color: #9090cc;
      min-width: 28px;
      text-align: center;
    }

    .step-badge.current {
      background: #4c1d95;
      border-color: #a78bfa;
      color: #e0d0ff;
    }

    .step-badge.done {
      opacity: 0.3;
    }

    #solvingMsg {
      font-size: 0.85em;
      color: #a78bfa;
    }

  </style>
</head>
<body>

  <h1>✦ VIBE CODING LAB ✦</h1>
  <p class="subtitle">滑動拼圖挑戰 — 4×4</p>


  <div class="puzzle-wrap">
    <div class="puzzle" id="puzzle"></div>
  </div>

  <div class="controls">
    <button onclick="newGame()">重新開始</button>
    <button onclick="toggleSolution()">顯示解答</button>
  </div>
  <p class="moves-label">移動次數：<span id="movesCount">0</span></p>

  <div class="solution-wrap" id="solutionWrap" style="display:none">
    <div class="solution-title">解題步驟（依序移動的數字）：<span id="solvingMsg"></span></div>
    <div class="solution-steps" id="solutionSteps"></div>
  </div>


  <script>
    const GRID = 4;
    const PX = 120;

    let tiles = [];
    let emptyPos = 15;
    let moves = 0;
    let isSolved = false;
    let solution = [];   // sequence of tile values to move
    let stepIndex = 0;

    // ── IDA* Solver ──────────────────────────────────────────
    function manhattan(state) {
      let d = 0;
      for (let i = 0; i < 16; i++) {
        if (state[i] === 0) continue;
        const v = state[i] - 1;
        d += Math.abs(Math.floor(i / 4) - Math.floor(v / 4)) + Math.abs(i % 4 - v % 4);
      }
      return d;
    }

    function isGoal(state) {
      for (let i = 0; i < 15; i++) if (state[i] !== i + 1) return false;
      return state[15] === 0;
    }

    function idaStar(initState, initEmpty) {
      const path = [];
      let bound = manhattan(initState);
      const state = initState.slice();

      for (let iter = 0; iter < 100; iter++) {
        const result = dfs(state, initEmpty, 0, bound, path, -1);
        if (result === -1) return path;
        if (result === Infinity) return null;
        bound = result;
      }
      return null;
    }

    function dfs(state, ep, g, bound, path, prevEp) {
      const f = g + manhattan(state);
      if (f > bound) return f;
      if (isGoal(state)) return -1;

      let min = Infinity;
      const eRow = Math.floor(ep / 4), eCol = ep % 4;
      const dirs = [
        ep - 4, // up
        ep + 4, // down
        ep - 1, // left
        ep + 1, // right
      ];
      const valid = dirs.filter(nb => {
        if (nb < 0 || nb >= 16) return false;
        if (nb === prevEp) return false;
        const nbRow = Math.floor(nb / 4), nbCol = nb % 4;
        return Math.abs(eRow - nbRow) + Math.abs(eCol - nbCol) === 1;
      });

      for (const nb of valid) {
        const tile = state[nb];
        state[ep] = tile;
        state[nb] = 0;
        path.push(tile);

        const r = dfs(state, nb, g + 1, bound, path, ep);
        if (r === -1) return -1;
        if (r < min) min = r;

        path.pop();
        state[nb] = tile;
        state[ep] = 0;
      }
      return min;
    }
    // ─────────────────────────────────────────────────────────


    function newGame() {
      moves = 0;
      isSolved = false;
      solution = [];
      stepIndex = 0;
      document.getElementById('movesCount').textContent = '0';
      document.getElementById('winOverlay').classList.remove('show');
      document.getElementById('solutionSteps').innerHTML = '';
      document.getElementById('solvingMsg').textContent = '計算中…';

      tiles = Array.from({ length: 16 }, (_, i) => (i < 15 ? i + 1 : 0));
      emptyPos = 15;

      for (let i = 0; i < 80; i++) {
        const nbrs = neighbors(emptyPos);
        const pick = nbrs[Math.floor(Math.random() * nbrs.length)];
        swap(emptyPos, pick);
        emptyPos = pick;
      }

      render();

      // Run solver async so render shows first
      setTimeout(() => {
        solution = idaStar(tiles.slice(), emptyPos) || [];
        stepIndex = 0;
        renderSolution();
      }, 50);
    }

    function renderSolution() {
      const msg = document.getElementById('solvingMsg');
      const container = document.getElementById('solutionSteps');
      container.innerHTML = '';

      if (solution.length === 0) {
        msg.textContent = '（無法求解）';
        return;
      }
      msg.textContent = `共 ${solution.length} 步`;

      solution.forEach((val, idx) => {
        const badge = document.createElement('div');
        badge.className = 'step-badge' +
          (idx < stepIndex ? ' done' : idx === stepIndex ? ' current' : '');
        badge.textContent = val;
        badge.id = `step-${idx}`;
        container.appendChild(badge);
      });

      // Scroll current badge into view
      const cur = document.getElementById(`step-${stepIndex}`);
      if (cur) cur.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }

    function neighbors(pos) {
      const r = Math.floor(pos / GRID), c = pos % GRID;
      const n = [];
      if (r > 0) n.push(pos - GRID);
      if (r < GRID - 1) n.push(pos + GRID);
      if (c > 0) n.push(pos - 1);
      if (c < GRID - 1) n.push(pos + 1);
      return n;
    }

    function swap(a, b) {
      [tiles[a], tiles[b]] = [tiles[b], tiles[a]];
    }

    function clickPos(pos) {
      if (isSolved) return;
      if (!neighbors(emptyPos).includes(pos)) return;
      swap(emptyPos, pos);
      emptyPos = pos;
      moves++;
      document.getElementById('movesCount').textContent = moves;

      if (solution.length > 0 && stepIndex < solution.length) {
        stepIndex++;
        renderSolution();
      }

      render();
      checkWin();
    }

    function checkWin() {
      // Check if tiles 1-14 are all in correct positions
      for (let i = 0; i < 14; i++) {
        if (tiles[i] !== i + 1) return;
      }
      // tiles[14] and tiles[15] hold {15, 0} in some order
      if (tiles[14] !== 15 && tiles[14] !== 0) return;
      if (tiles[15] !== 0 && tiles[15] !== 15) return;

      isSolved = true;

      // Auto-fill: if tile 15 is at pos 15 and empty at 14, slide it home
      if (tiles[14] === 0 && tiles[15] === 15) {
        tiles[14] = 15;
        tiles[15] = 0;
        emptyPos = 15;
        render();
      }

      // Now visually fill the empty space (pos 15) with the final image piece
      setTimeout(() => {
        const puzzle = document.getElementById('puzzle');
        const fill = document.createElement('div');
        fill.className = 'tile landing';
        fill.style.left = (3 * PX) + 'px';
        fill.style.top = (3 * PX) + 'px';
        fill.style.backgroundPositionX = -(3 * PX) + 'px';
        fill.style.backgroundPositionY = -(3 * PX) + 'px';
        fill.style.border = '1.5px solid #a78bfa';
        puzzle.appendChild(fill);
      }, 100);

      setTimeout(() => {
        document.getElementById('movesCount').textContent = moves + ' ✓ 完成！';
      }, 700);
    }

    function render() {
      const puzzle = document.getElementById('puzzle');
      puzzle.innerHTML = '';

      for (let pos = 0; pos < 16; pos++) {
        const val = tiles[pos];
        const row = Math.floor(pos / GRID);
        const col = pos % GRID;

        const el = document.createElement('div');
        el.className = 'tile' + (val === 0 ? ' empty' : '');
        el.style.left = col * PX + 'px';
        el.style.top = row * PX + 'px';
        el.dataset.pos = pos;

        if (val !== 0) {
          const imgRow = Math.floor((val - 1) / GRID);
          const imgCol = (val - 1) % GRID;
          el.style.backgroundPositionX = -(imgCol * PX) + 'px';
          el.style.backgroundPositionY = -(imgRow * PX) + 'px';

          // Highlight tile that should be moved next
          if (solution.length > 0 && stepIndex < solution.length && val === solution[stepIndex]) {
            el.style.boxShadow = '0 0 0 3px #a78bfa, 0 0 14px #a78bfa';
          }

          const num = document.createElement('div');
          num.className = 'num';
          num.textContent = val;
          el.appendChild(num);

          el.addEventListener('click', () => clickPos(pos));
        }

        puzzle.appendChild(el);
      }
    }

    document.addEventListener('keydown', (e) => {
      const map = {
        ArrowUp: emptyPos + GRID,
        ArrowDown: emptyPos - GRID,
        ArrowLeft: emptyPos + 1,
        ArrowRight: emptyPos - 1,
      };
      const target = map[e.key];
      if (target !== undefined && target >= 0 && target < 16) {
        const eRow = Math.floor(emptyPos / GRID), eCol = emptyPos % GRID;
        const tRow = Math.floor(target / GRID), tCol = target % GRID;
        if (Math.abs(eRow - tRow) + Math.abs(eCol - tCol) === 1) {
          e.preventDefault();
          clickPos(target);
        }
      }
    });

    function toggleSolution() {
      const wrap = document.getElementById('solutionWrap');
      const btn = event.target;
      if (wrap.style.display === 'none') {
        wrap.style.display = 'block';
        btn.textContent = '隱藏解答';
      } else {
        wrap.style.display = 'none';
        btn.textContent = '顯示解答';
      }
    }

    newGame();
  </script>
</body>
</html>
